name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Extract version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          for GOOS in darwin linux windows; do
            for GOARCH in amd64 arm64; do
              BIN="figma-mcp-go"
              if [ "$GOOS" = "windows" ]; then BIN="figma-mcp-go.exe"; fi

              OUTDIR="npm/bin/${GOOS}-${GOARCH}"
              mkdir -p "$OUTDIR"

              GOOS=$GOOS GOARCH=$GOARCH go build \
                -ldflags "-X main.version=$VERSION" \
                -o "$OUTDIR/$BIN" \
                ./cmd/figma-mcp-go

              if [ "$GOOS" != "windows" ]; then chmod +x "$OUTDIR/$BIN"; fi
            done
          done

      - uses: oven-sh/setup-bun@v2

      - name: Build plugin
        working-directory: plugin
        run: bun install && bun run build

      - name: Package plugin
        run: |
          mkdir -p plugin-dist
          cp plugin/manifest.json plugin-dist/
          cp plugin/dist/code.js plugin-dist/
          cp plugin/dist/index.html plugin-dist/
          zip -r plugin.zip plugin-dist/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: plugin.zip
          generate_release_notes: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          cp ../README.md .
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          npm publish --access public
